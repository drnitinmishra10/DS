
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Data Science Quiz: Churn Problem Statement</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #2d3748;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .quiz-wrapper {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        h1 {
            color: #1a365d;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        h2 {
            color: #4a5568;
            font-size: 1.05rem;
            margin-bottom: 25px;
            font-weight: 400;
        }
        .alert-info {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 12px 15px;
            margin-bottom: 25px;
            border-radius: 0 6px 6px 0;
            font-size: 0.95rem;
            color: #2b6cb0;
        }
        .q-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 18px 22px;
            margin-bottom: 25px;
            border-radius: 8px;
        }
        .q-text {
            font-weight: 600;
            margin-bottom: 12px;
            color: #2d3748;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .option-item input[type="checkbox"] {
            margin-top: 5px;
            margin-right: 12px;
            transform: scale(1.1);
        }
        .option-label {
            font-size: 0.95rem;
            color: #4a5568;
        }
        .feedback {
            margin-top: 12px;
            font-weight: 500;
            font-size: 0.95rem;
            display: none;
            padding: 8px 12px;
            border-radius: 4px;
        }
        .status-correct {
            background-color: #f0fff4;
            color: #276749;
            border-left: 3px solid #38a169;
        }
        .status-incorrect {
            background-color: #fff5f5;
            color: #9b2c2c;
            border-left: 3px solid #e53e3e;
        }
        .btn-submit {
            display: block;
            width: 100%;
            background: #2b6cb0;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #2c5282; }
        #score-board {
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 25px;
            color: #2b6cb0;
            display: none;
            padding: 15px;
            background: #edf2f7;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="quiz-wrapper">
    <h1>Project Evaluation Quiz: Customer Churn Sandbox</h1>
    <h2>Topic: Problem Statement Metrics, OSEMN Mapping & Strategic Scope</h2>
    
    <div class="alert-info">
        <strong>Note:</strong> This is a multi-correct quiz. Each question contains <strong>more than one correct answer</strong>. Select all options that apply to get full credit for a question.
    </div>

    <form id="multiQuizForm">
        <div id="quiz-questions-target"></div>
        <button type="button" class="btn-submit" onclick="gradeMultiQuiz()">Evaluate Performance</button>
    </form>

    <div id="score-board"></div>
</div>

<script>
    const questions = [
        {
            q: "According to the corporate context description, which departments directly require predictive insights to take corporate actions?",
            opts: ["Marketing department", "Operations team", "Legal compliance desk", "Security infrastructure wing"],
            ans: [0, 1]
        },
        {
            q: "During the 'Obtain' phase of this specific e-commerce project, which datasets must be combined to map out the overall customer timeline?",
            opts: ["Web/App analytics clickstream logs", "Historical transaction logs", "Employee biometric login attendance data", "Customer support interaction tickets"],
            ans: [0, 1, 3]
        },
        {
            q: "Which actions constitute appropriate technical work during the 'Scrub' phase for this specific churn model dataset?",
            opts: ["Replacing null values in activity fields with zero flags", "Separating wholesale bulk buyers from the retail cohort to avoid data skew", "Tuning hyperparameters for an XGBoost algorithm", "Standardizing server timezones across different transactional platforms"],
            ans: [0, 1, 3]
        },
        {
            q: "Which findings discovered during Exploratory Data Analysis (EDA) would confirm early structural hypotheses about customer attrition?",
            opts: ["Pinpointing that a 45-day inactivity window yields an 85% probability of permanent drop-off", "Isolating a pattern linking delayed logistics delivery times with increased customer complaints", "Deploying an early-warning production pipeline script inside the primary application container", "Observing a steady decline in average transactional ticket size months prior to final active purchases"],
            ans: [0, 1, 3]
        },
        {
            q: "What are the core technical focuses specified inside the 'Model' phase of this project?",
            opts: ["Calculating basic descriptive summaries such as mean or median variables", "Isolating feature importance configurations to uncover structural drivers", "Generating discrete risk probability outputs instead of basic boolean classifications", "Upgrading core database tables to support continuous web scraping pipelines"],
            ans: [1, 2]
        },
        {
            q: "Which operational targets directly represent successful execution during the 'Interpret' stage?",
            opts: ["Deploying automated, tailored retention offers dynamically across targeted consumer brackets", "Refining core payment infrastructure processes to eliminate transaction friction points", "Presenting metrics to strategic decision-makers through structured visual interfaces", "Filtering raw structural records using complex data clearing code repositories"],
            ans: [0, 1, 2]
        },
        {
            q: "Which specific financial or business performance goals were explicit targets inside the project documentation?",
            opts: ["Achieving an absolute reduction in broad platform attrition by 12% across 6 months", "Optimizing functional retention budgets by roughly 20% using high-precision targeted reach", "Decreasing product returns by 50% relative to general fulfillment standards", "Increasing raw user registrations by 30% via global referral incentives"],
            ans: [0, 1]
        },
        {
            q: "What are the core business problems explicitly mentioned in the project's 'Problem Statement' section?",
            opts: ["Inability to identify at-risk customers before they permanently leave the platform", "Uniform and inefficient distribution of retention budgets across the entire customer base", "A continuous decline in regular repeat purchase patterns spanning multiple consecutive quarters", "Excessive web app latency during peak platform promotional hours"],
            ans: [0, 1, 2]
        },
        {
            q: "Which metrics have been selected to gauge the technical data science accuracy of the machine learning configuration?",
            opts: ["Model Recall score metrics", "ROC-AUC curve evaluations", "Raw page views per minute calculations", "Average system API latency benchmarks"],
            ans: [0, 1]
        },
        {
            q: "Why is an standard binary 'Yes/No' classification outcome insufficient for this churn management initiative?",
            opts: ["The business requires numerical probability scores to separate users into specific action brackets", "Marketing campaigns rely on progressive score thresholds rather than hard default labels", "Standard classification models cannot compute categorical targets without scaling metrics", "Probability margins help calculate the financial risk score associated with top-tier account sets"],
            ans: [0, 1, 3]
        },
        {
            q: "Which behavioral data parameters extracted from web analytics would help flag a user approaching the churn threshold?",
            opts: ["A notable downward trend in overall weekly app login frequency", "An accumulation of incomplete checkouts and abandoned items inside the cart array", "Frequent changes to user passwords or standard security profiles", "A substantial reduction in the overall duration of active app browsing sessions"],
            ans: [0, 1, 3]
        },
        {
            q: "In an OSEMN workflow, which structural traits make the process heavily iterative rather than purely linear?",
            opts: ["Modeling roadblocks often force engineering teams to go back and scrub or engineer features differently", "Exploratory phases constantly uncover structural flaws requiring new auxiliary data collection", "Interpretation outcomes directly dictate immediate changes to raw feature processing logic", "The acronym sequence strictly blocks backward validation loops to ensure delivery speeds"],
            ans: [0, 1, 2]
        },
        {
            q: "Which operational metrics are monitored closely in the customer support logs to evaluate potential churn correlations?",
            opts: ["The average amount of time required to settle customer dispute tickets", "The volume of item refund requests lodged by distinct accounts", "The structural font size utilized inside mobile system notification prompts", "The total count of formal complaints logged by a single profile"],
            ans: [0, 1, 3]
        },
        {
            q: "Why does the problem statement recommend moving away from mass communication strategies?",
            opts: ["Mass campaigns dilute budget allocations by incentivizing users who do not require prompts", "Universal discounting diminishes overall brand equity metrics without driving incremental lift", "Blanket approaches fail to address specific operational reasons behind individual user drop-offs", "E-commerce transactional frameworks structurally prohibit uniform communication broadcasts"],
            ans: [0, 1, 2]
        },
        {
            q: "To build a robust model, which engineering parameters should be derived by combining transaction dates and customer profiles?",
            opts: ["Recency matrix values calculating the elapsed time since a user's final active order", "The calculated variance in frequency between standard purchases over a multi-month view", "The physical weight profile data of fulfillment boxes dispatched to residential nodes", "A rolling comparison of recent seasonal purchase values against an individual's historical baselines"],
            ans: [0, 1, 3]
        }
    ];

    function initializeQuiz() {
        const target = document.getElementById('quiz-questions-target');
        questions.forEach((qObj, qIdx) => {
            const card = document.createElement('div');
            card.className = 'q-box';
            
            let choicesHtml = '';
            qObj.opts.forEach((optText, oIdx) => {
                choicesHtml += `
                    <label class="option-item">
                        <input type="checkbox" name="q_${qIdx}" value="${oIdx}">
                        <span class="option-label">${optText}</span>
                    </label>
                `;
            });

            card.innerHTML = `
                <div class="q-text">${qIdx + 1}. ${qObj.q}</div>
                <div class="choices-container">${choicesHtml}</div>
                <div class="feedback" id="fb_${qIdx}"></div>
            `;
            target.appendChild(card);
        });
    }

    function gradeMultiQuiz() {
        let totalQuestions = questions.length;
        let perfectQuestions = 0;

        questions.forEach((qObj, qIdx) => {
            const feedbackBox = document.getElementById(`fb_${qIdx}`);
            feedbackBox.style.display = 'block';

            const checkboxes = document.querySelectorAll(`input[name="q_${qIdx}"]`);
            let selectedIndices = [];
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selectedIndices.push(parseInt(cb.value));
                }
            });

            // Compare arrays
            const expectedIndices = qObj.ans;
            const matchesExpected = selectedIndices.length === expectedIndices.length && 
                                    selectedIndices.every(val => expectedIndices.includes(val));

            if (matchesExpected) {
                perfectQuestions++;
                feedbackBox.className = "feedback status-correct";
                feedbackBox.innerHTML = "&#10004; Correct! All matched options selected.";
            } else {
                const correctTextLabels = expectedIndices.map(idx => `"${qObj.opts[idx]}"`).join(', ');
                feedbackBox.className = "feedback status-incorrect";
                feedbackBox.innerHTML = "&#10008; Incorrect. Expected options: " + correctTextLabels;
            }
        });

        const scoreBoard = document.getElementById('score-board');
        scoreBoard.style.display = 'block';
        scoreBoard.innerHTML = `Quiz Performance: ${perfectQuestions} / ${totalQuestions} Perfect Answers Match (${(perfectQuestions / totalQuestions * 100).toFixed(0)}%)`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.onload = initializeQuiz;
</script>

</body>
</html>
