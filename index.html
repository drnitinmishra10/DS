
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operating Systems Lab & Resources Index</title>
    <style>
        :root {
            --primary-color: #2a2e43;
            --accent-color: #00adb5;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Banner styling with OS concept background image */
        .hero-banner {
            background: linear-gradient(rgba(42, 46, 67, 0.85), rgba(42, 46, 67, 0.9)), 
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            color: #ffffff;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hero-banner h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .hero-banner p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .professor-badge {
            display: inline-block;
            background: rgba(0, 173, 181, 0.2);
            border: 1px solid var(--accent-color);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
        }

        /* Main Layout */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Utilities Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-bar {
            padding: 12px 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(0, 173, 181, 0.3);
        }

        .file-count {
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Dynamic Card Styling */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 24px;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 4px solid var(--accent-color);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, transparent 50%, rgba(0, 173, 181, 0.05) 50%);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 12px;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            word-break: break-all;
            font-family: monospace;
        }

        .card-btn {
            display: inline-block;
            text-align: center;
            background-color: var(--primary-color);
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        .card-btn:hover {
            background-color: var(--accent-color);
        }

        /* Status States */
        .loading, .error {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .loading { color: var(--accent-color); }
        .error { color: #de4437; }

        footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
            color: var(--text-muted);
            border-top: 1px solid #e0e0e0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header class="hero-banner">
        <h1>Data Science Repository Index</h1>
        <p>A collection of core operational algorithms, lab exercises, and system paradigms.</p>
        <div class="professor-badge">Mentor: Dr. Nitin Mishra</div>
    </header>

    <main class="container">
        <div class="controls">
            <input type="text" id="search" class="search-bar" placeholder="Search files by title or name...">
            <div id="count" class="file-count">Loading files...</div>
        </div>

        <div id="index-grid" class="grid">
            <div class="loading">Scanning repository structures...</div>
        </div>
    </main>

    <footer>
        &copy; 2026 Repository Indexing Engine | Designed for data Science Educational Resource Management
    </footer>

    <script>
        // Target repository configuration
        const REPO_OWNER = 'drnitinmishra10';
        const REPO_NAME = 'DS';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/main?recursive=1`;

        const gridEl = document.getElementById('index-grid');
        const searchEl = document.getElementById('search');
        const countEl = document.getElementById('count');

        let allFiles = [];

        // Helper to cleanly extract HTML titles via temporary parsing
        function extractTitle(htmlText, fallbackName) {
    try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, "text/html");

        // Read the HTML <title> tag
        const title = doc.title.trim();

        return title.length ? title : fallbackName;
    } catch (e) {
        console.error("Unable to extract title:", e);
        return fallbackName;
    }
}

        // Fetch repository tree and process files asynchronously
        async function loadRepositoryIndex() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network visibility constraints encountered.');
                
                const data = await response.json();
                
                // Isolate HTML files excluding index.html itself to prevent recursion loop
                const htmlFiles = data.tree.filter(file => 
                    file.path.endsWith('.html') && 
                    file.path.toLowerCase() !== 'index.html' &&
                    file.type === 'blob'
                );

                if (htmlFiles.length === 0) {
                    gridEl.innerHTML = '<div class="error">No supplemental HTML resource documents detected in this tree branch.</div>';
                    countEl.textContent = '0 files found';
                    return;
                }

                // Resolve references and fetch underlying file contents concurrently to pull title attributes
                const processPromises = htmlFiles.map(async (file) => {
                    const rawUrl = `https://raw.githubusercontent.com/drnitinmishra10/OS/main/${file.path}`;
                    let title = file.path.split('/').pop(); // Initial fallback to file name

                    try {
                        const fileRes = await fetch(rawUrl);
                        if (fileRes.ok) {
                            const text = await fileRes.text();
                            title = extractTitle(text, title);
                        }
                    } catch (err) {
                        console.warn(`Meta-title extraction skipped for ${file.path}:`, err);
                    }

                    return {
                        path: file.path,
                        title: title,
                        url: `https://drnitinmishra10.github.io/DS/${file.path}`
                    };
                });

                allFiles = await Promise.all(processPromises);
                renderGrid(allFiles);

            } catch (error) {
                console.error(error);
                gridEl.innerHTML = '<div class="error">Error querying the structural deployment layout. Verify GitHub Pages publishing options.</div>';
                countEl.textContent = 'Error';
            }
        }

        // Render card interfaces dynamically
        function renderGrid(files) {
            gridEl.innerHTML = '';
            
            if (files.length === 0) {
                gridEl.innerHTML = '<div class="error">No matching index documents match your criteria.</div>';
                countEl.textContent = '0 files matching';
                return;
            }

            files.forEach(file => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <div class="card-title" title="${file.title}">${file.title}</div>
                        <div class="card-meta">📁 ${file.path}</div>
                    </div>
                    <a href="${file.url}" class="card-btn" target="_blank">Execute/View Resource</a>
                `;
                gridEl.appendChild(card);
            });

            countEl.textContent = `Displaying ${files.length} structural file link(s)`;
        }

        // Live input query event filter
        searchEl.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = allFiles.filter(f => 
                f.title.toLowerCase().includes(query) || 
                f.path.toLowerCase().includes(query)
            );
            renderGrid(filtered);
        });

        // Initialize execution sequence on page ready
        document.addEventListener('DOMContentLoaded', loadRepositoryIndex);
    </script>
</body>
</html>
